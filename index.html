<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anak Buluh Betong Kg. Kundur Ulu — Dari Ladang Pilihan Panda</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }

:root {
  --hijau: #1e3a1e;
  --hijau2: #2d5a2d;
  --hijau3: #4a8a4a;
  --krim: #f7f3ec;
  --krim2: #ede8de;
  --emas: #b07d3a;
  --teks: #1a2e1a;
  --teks2: #445544;
  --teks3: #7a9070;
  --putih: #fdfaf6;
}

body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: var(--krim);
  color: var(--teks);
  font-size: 17px;
  line-height: 1.7;
  overflow-x: hidden;
}

/* ─── NAV ─── */
.nav {
  position: fixed; top:0; left:0; right:0; z-index:900;
  background: rgba(26,46,26,.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(255,255,255,.08);
  padding: 0 24px;
  display: flex; align-items:center; justify-content:space-between;
  gap: 16px;
  height: 54px;
  transition: background .35s, box-shadow .35s;
}
.nav.skrol {
  background: rgba(247,243,236,.97);
  border-bottom: 1px solid var(--krim2);
  box-shadow: 0 2px 16px rgba(0,0,0,.06);
}
.nav-logo {
  font-family: 'Lora', serif;
  font-size: 16px; font-weight:700;
  color: rgba(255,255,255,.9);
  letter-spacing: -.2px; white-space:nowrap;
  text-decoration:none;
  transition: color .35s;
  flex-shrink:0;
}
.nav.skrol .nav-logo { color: var(--hijau); }

/* Nav links — section guide */
.nav-links {
  display: flex; align-items:center; gap:0;
  flex:1; justify-content:center;
  overflow-x:auto; scrollbar-width:none;
}
.nav-links::-webkit-scrollbar { display:none; }
.nav-link {
  font-size: 12.5px; font-weight:600;
  color: rgba(255,255,255,.55);
  text-decoration:none; white-space:nowrap;
  padding: 0 14px; height:54px;
  display:flex; align-items:center;
  border-bottom: 2px solid transparent;
  transition: color .2s, border-color .2s;
  letter-spacing:.2px;
}
.nav-link:hover { color: rgba(255,255,255,.9); }
.nav-link.aktif { color: white; border-bottom-color: rgba(255,255,255,.5); }
.nav.skrol .nav-link { color: var(--teks3); }
.nav.skrol .nav-link:hover { color: var(--hijau); }
.nav.skrol .nav-link.aktif { color: var(--hijau); border-bottom-color: var(--hijau3); }

.nav-beli {
  background: var(--emas); color: white;
  padding: 8px 18px; border-radius: 6px;
  font-size: 13px; font-weight:700;
  border:none; cursor:pointer;
  text-decoration:none; white-space:nowrap;
  flex-shrink:0;
  transition: background .2s, transform .15s;
}
.nav-beli:hover { background: #8f6228; transform:translateY(-1px); }

@media(max-width:640px){
  .nav-links { display:none; }
  .nav { justify-content:space-between; }
}

/* ─── TOAST ─── */
.toast {
  position:fixed; top:16px; left:50%;
  transform: translateX(-50%) translateY(-60px);
  background: var(--hijau); color:white;
  padding: 9px 20px; border-radius:6px;
  font-size:13.5px; font-weight:600;
  z-index:9999;
  transition: transform .4s cubic-bezier(.34,1.56,.64,1);
  white-space:nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ─── NOTIF ─── */
.notif {
  position:fixed; bottom:90px; left:16px;
  background:white; border-radius:10px;
  padding:12px 16px;
  box-shadow: 0 4px 24px rgba(0,0,0,.12);
  display:flex; align-items:center; gap:10px;
  z-index:800; max-width:270px;
  transform: translateX(-110%);
  transition: transform .5s cubic-bezier(.34,1.56,.64,1);
  border-left: 3px solid var(--hijau3);
}
.notif.show { transform: translateX(0); }
.notif-teks { font-size:12px; line-height:1.4; }
.notif-nama { font-weight:700; color:var(--hijau); }
.notif-masa { font-size:10.5px; color:var(--teks3); margin-top:1px; }

/* ─── FAB ─── */
.fab {
  position:fixed; bottom:24px; right:20px;
  background: var(--hijau); color:white;
  border:none; border-radius:8px;
  padding: 12px 18px;
  font-size:14px; font-weight:600;
  cursor:pointer; z-index:800;
  display:flex; align-items:center; gap:8px;
  box-shadow: 0 4px 20px rgba(30,58,30,.3);
  transition: background .2s, transform .2s;
  font-family: 'Plus Jakarta Sans', sans-serif;
}
.fab:hover { background: var(--hijau2); transform: translateY(-1px); }
.fab-badge {
  background: var(--emas); color:white;
  border-radius:50%; width:18px; height:18px;
  font-size:10px; font-weight:700;
  display:none; align-items:center; justify-content:center;
  margin-left:2px;
}

/* ─── TROLI DRAWER ─── */
.latar {
  position:fixed; inset:0;
  background: rgba(30,58,30,.5);
  z-index:1000; opacity:0; pointer-events:none;
  transition: opacity .3s;
}
.latar.buka { opacity:1; pointer-events:all; }

.troli {
  position:fixed; top:0; right:0; bottom:0;
  width: min(380px, 100vw);
  background: var(--putih);
  z-index:1100;
  transform: translateX(100%);
  transition: transform .4s cubic-bezier(.4,0,.2,1);
  display:flex; flex-direction:column;
  box-shadow: -8px 0 40px rgba(0,0,0,.15);
}
.troli.buka { transform: translateX(0); }
.troli-atas {
  padding:20px 22px;
  border-bottom:1px solid var(--krim2);
  display:flex; align-items:center; justify-content:space-between;
}
.troli-atas h3 {
  font-family:'Lora',serif; font-size:18px; color:var(--hijau);
}
.tutup {
  width:30px; height:30px; border-radius:50%;
  background:var(--krim2); border:none; cursor:pointer;
  font-size:14px;
}
.troli-isi { flex:1; overflow-y:auto; padding:16px 22px; }
.troli-kosong { text-align:center; padding:48px 0; color:var(--teks3); font-size:14px; }
.troli-item {
  display:flex; gap:12px; padding:12px 0;
  border-bottom:1px solid var(--krim2); align-items:center;
}
.ti-info { flex:1; }
.ti-nama { font-weight:600; font-size:13px; color:var(--hijau); }
.ti-harga { font-size:11.5px; color:var(--teks3); margin-top:1px; }
.ti-kawalan { display:flex; align-items:center; gap:7px; margin-top:5px; }
.ti-btn {
  width:22px; height:22px; border-radius:4px;
  border:1px solid var(--krim2); background:white;
  cursor:pointer; font-size:13px;
}
.ti-qty { font-size:13px; font-weight:700; min-width:18px; text-align:center; }
.ti-jumlah { font-weight:700; color:var(--hijau2); font-size:13.5px; }
.troli-bawah {
  padding:18px 22px;
  border-top:1px solid var(--krim2);
  background: var(--krim);
}
.troli-total {
  display:flex; justify-content:space-between; align-items:baseline;
  margin-bottom:14px;
}
.troli-total span { font-size:13.5px; color:var(--teks2); }
.troli-total strong { font-family:'Lora',serif; font-size:22px; color:var(--hijau); }
.btn-checkout {
  width:100%; background:var(--hijau); color:white;
  border:none; padding:14px; border-radius:8px;
  font-weight:600; font-size:14.5px; cursor:pointer;
  font-family:'Plus Jakarta Sans',sans-serif;
  transition: background .2s;
}
.btn-checkout:hover { background:var(--hijau2); }

/* ─── CHECKOUT MODAL ─── */
.modal-latar {
  position:fixed; inset:0;
  background:rgba(30,58,30,.6);
  z-index:1200; display:none;
  align-items:center; justify-content:center;
  padding:20px;
  backdrop-filter:blur(4px);
}
.modal-latar.buka { display:flex; }
.modal {
  background:var(--putih); border-radius:14px;
  width:100%; max-width:480px;
  max-height:90vh; overflow-y:auto;
  box-shadow:0 20px 60px rgba(0,0,0,.2);
  animation: masuk .35s cubic-bezier(.34,1.56,.64,1);
}
@keyframes masuk { from{opacity:0;transform:scale(.94) translateY(12px);} to{opacity:1;transform:scale(1) translateY(0);} }
.modal-atas { padding:22px 24px 16px; border-bottom:1px solid var(--krim2); }
.langkah-bar { display:flex; gap:4px; margin-bottom:12px; }
.l-titik { height:3px; flex:1; border-radius:2px; background:var(--krim2); transition:background .3s; }
.l-titik.aktif { background:var(--hijau3); }
.l-titik.siap { background:var(--hijau3); opacity:.5; }
.modal-tajuk { font-family:'Lora',serif; font-size:20px; color:var(--hijau); }
.modal-sub { font-size:12.5px; color:var(--teks3); margin-top:2px; }
.modal-badan { padding:20px 24px; }
.kump { margin-bottom:16px; }
.label { display:block; font-size:11.5px; font-weight:700; color:var(--teks2); margin-bottom:6px; text-transform:uppercase; letter-spacing:.5px; }
.input {
  width:100%; padding:11px 13px;
  border:1.5px solid var(--krim2); border-radius:8px;
  font-size:14px; font-family:'Plus Jakarta Sans',sans-serif;
  color:var(--teks); background:white;
  outline:none; transition:border-color .2s;
}
.input:focus { border-color:var(--hijau3); }
.ringkasan { background:var(--krim); border-radius:10px; padding:14px 16px; margin-bottom:16px; }
.ringkasan h4 { font-size:11.5px; font-weight:700; color:var(--teks2); margin-bottom:10px; text-transform:uppercase; letter-spacing:.4px; }
.r-baris { display:flex; justify-content:space-between; font-size:12.5px; color:var(--teks2); margin-bottom:5px; }
.r-jumlah { border-top:1px solid var(--krim2); padding-top:8px; margin-top:8px; display:flex; justify-content:space-between; font-weight:700; color:var(--hijau); }
.r-jumlah span:last-child { font-family:'Lora',serif; font-size:18px; }
.pilihan-bayar { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:16px; }
.pilihan {
  border:1.5px solid var(--krim2); border-radius:10px;
  padding:14px 10px; cursor:pointer; text-align:center; transition:all .2s;
}
.pilihan:hover { border-color:var(--hijau3); }
.pilihan.dipilih { border-color:var(--hijau); background:rgba(30,58,30,.04); }
.pilihan-ikon { font-size:24px; margin-bottom:5px; }
.pilihan-nama { font-weight:700; font-size:12.5px; color:var(--hijau); }
.pilihan-sub { font-size:10.5px; color:var(--teks3); margin-top:1px; }
.kotak-bayar { background:var(--krim); border-radius:10px; padding:14px 16px; margin-bottom:14px; display:none; }
.kotak-bayar.tunjuk { display:block; }
.kotak-bayar h4 { font-weight:700; color:var(--hijau); margin-bottom:10px; font-size:13px; }
.baris-akaun {
  display:flex; justify-content:space-between; align-items:center;
  background:white; border-radius:7px; padding:10px 12px;
  margin-bottom:5px; border:1px solid var(--krim2);
}
.akaun-label { font-size:10.5px; color:var(--teks3); }
.akaun-nilai { font-weight:700; color:var(--hijau); font-size:14px; margin-top:1px; }
.btn-salin {
  background:var(--hijau); color:white; border:none;
  padding:4px 11px; border-radius:5px; font-size:11px;
  cursor:pointer; font-family:'Plus Jakarta Sans',sans-serif;
}
.qr-kotak { text-align:center; padding:12px; background:white; border-radius:8px; border:1px solid var(--krim2); }
.zon-upload {
  border:2px dashed var(--hijau3); border-radius:10px;
  padding:24px; text-align:center; cursor:pointer;
  position:relative; overflow:hidden; transition:all .2s;
  background:rgba(74,138,74,.03);
}
.zon-upload:hover { background:rgba(74,138,74,.08); }
.zon-upload.ada-fail { border-color:var(--hijau); background:rgba(30,58,30,.05); }
.zon-upload input { position:absolute; inset:0; opacity:0; cursor:pointer; }
.upload-teks { font-size:14px; color:var(--teks2); font-weight:600; margin-bottom:3px; }
.upload-sub { font-size:11.5px; color:var(--teks3); }
.pratonton { display:none; align-items:center; gap:8px; margin-top:12px; background:white; border-radius:7px; padding:10px 12px; border:1px solid var(--krim2); }
.pratonton.tunjuk { display:flex; }
.nama-fail { font-size:12px; font-weight:600; color:var(--hijau); flex:1; }
.modal-kaki { padding:0 24px 24px; display:flex; gap:8px; }
.btn-balik {
  flex:1; padding:12px; border-radius:8px;
  border:1.5px solid var(--krim2); background:white;
  font-weight:600; cursor:pointer; color:var(--teks2);
  font-family:'Plus Jakarta Sans',sans-serif; font-size:14px;
}
.btn-balik:hover { border-color:var(--hijau3); }
.btn-terus {
  flex:2; padding:12px; border-radius:8px;
  border:none; background:var(--hijau); color:white;
  font-weight:700; font-size:14.5px; cursor:pointer;
  font-family:'Plus Jakarta Sans',sans-serif;
}
.btn-terus:hover { background:var(--hijau2); }
.btn-terus:disabled { opacity:.4; cursor:not-allowed; }
.ty { text-align:center; padding:32px 24px 24px; }
.ty-bulat {
  width:64px; height:64px; border-radius:50%;
  background:var(--hijau); margin:0 auto 16px;
  display:flex; align-items:center; justify-content:center;
  font-size:28px; animation:pop .5s cubic-bezier(.34,1.56,.64,1);
}
@keyframes pop { from{transform:scale(0);opacity:0;} to{transform:scale(1);opacity:1;} }
.ty h2 { font-family:'Lora',serif; font-size:22px; color:var(--hijau); margin-bottom:8px; }
.ty p { font-size:13.5px; color:var(--teks3); line-height:1.6; max-width:320px; margin:0 auto 20px; }
.ref-kotak { background:var(--krim); border-radius:10px; padding:14px 16px; margin-bottom:16px; text-align:left; }
.ref-label { font-size:10.5px; color:var(--teks3); text-transform:uppercase; letter-spacing:1px; }
.ref-nilai { font-family:'Lora',serif; font-size:20px; color:var(--hijau); font-weight:700; margin-top:3px; }
.btn-wa {
  width:100%; background:#25D366; color:white;
  border:none; padding:14px; border-radius:8px;
  font-weight:700; font-size:14.5px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; gap:7px;
  text-decoration:none; font-family:'Plus Jakarta Sans',sans-serif;
  transition:background .2s;
}
.btn-wa:hover { background:#1da851; }
.btn-sambung {
  width:100%; margin-top:10px; background:transparent;
  color:var(--teks3); border:1.5px solid var(--krim2); padding:11px;
  border-radius:8px; font-size:13.5px; cursor:pointer;
  font-family:'Plus Jakarta Sans',sans-serif;
}

/* ═══════════════════════════════
   HALAMAN UTAMA
═══════════════════════════════ */

/* ─── HERO — fullscreen gambar panda ─── */
.hero {
  min-height: 100vh;
  padding-top: 54px;
  background-image: url('https://images.unsplash.com/photo-1564349683136-77e08dba1ef7?w=1600&q=85');
  background-size: cover;
  background-position: center 25%;
  position: relative;
  display: flex;
  align-items: flex-end;
}
.hero::after {
  content:'';
  position:absolute; inset:0;
  background: linear-gradient(
    to top,
    rgba(15,28,15,.95) 0%,
    rgba(15,28,15,.6) 40%,
    rgba(15,28,15,.15) 80%,
    transparent 100%
  );
}
.hero-dalam {
  position:relative; z-index:1;
  max-width:720px;
  padding: 0 32px 64px;
}
.hero-sumber {
  display:inline-block;
  font-size:11px; color:rgba(255,255,255,.5);
  letter-spacing:1.5px; text-transform:uppercase;
  margin-bottom:20px;
  border-left:2px solid var(--emas);
  padding-left:10px;
}
.hero h1 {
  font-family:'Lora',serif;
  font-size: clamp(36px, 6vw, 68px);
  font-weight:700; color:white;
  line-height:1.1; margin-bottom:20px;
}
.hero h1 em { font-style:italic; color:#a8d8a8; }
.hero-teks {
  font-size:17px; color:rgba(255,255,255,.7);
  line-height:1.75; max-width:560px; margin-bottom:32px;
}
.hero-btn-wrap { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:48px; }
.btn-hijau {
  background:white; color:var(--hijau);
  padding:14px 28px; border-radius:7px;
  font-weight:700; font-size:15px; border:none;
  cursor:pointer; transition:all .2s; text-decoration:none;
}
.btn-hijau:hover { background:var(--krim); transform:translateY(-1px); }
.btn-lutsinar {
  background:transparent; color:rgba(255,255,255,.8);
  padding:14px 28px; border-radius:7px; font-weight:500; font-size:15px;
  border:1px solid rgba(255,255,255,.3); cursor:pointer; text-decoration:none;
}
.btn-lutsinar:hover { border-color:rgba(255,255,255,.6); color:white; }

.hero-angka {
  display:flex; gap:0;
  border-top:1px solid rgba(255,255,255,.12);
  padding-top:24px;
}
.hstat {
  padding:0 28px 0 0; margin-right:28px;
  border-right:1px solid rgba(255,255,255,.1);
}
.hstat:last-child { border:none; }
.hstat-num {
  font-family:'Lora',serif; font-size:34px; font-weight:700;
  color:#a8d8a8; line-height:1;
}
.hstat-label { font-size:11px; color:rgba(255,255,255,.4); margin-top:3px; line-height:1.4; }

/* ─── BERITA STRIP ─── */
.berita-strip {
  background:var(--hijau);
  padding:16px 32px;
  display:flex; align-items:center; gap:16px; flex-wrap:wrap;
}
.berita-strip-label {
  font-size:10px; font-weight:700; letter-spacing:2px;
  text-transform:uppercase; color:rgba(255,255,255,.5);
  white-space:nowrap;
}
.berita-logos {
  display:flex; gap:16px; align-items:center; flex-wrap:wrap;
}
.berita-logo {
  background:rgba(255,255,255,.1);
  color:rgba(255,255,255,.7);
  padding:5px 14px; border-radius:4px;
  font-size:12px; font-weight:700; letter-spacing:.5px;
  text-decoration:none; transition:background .2s; white-space:nowrap;
}
.berita-logo:hover { background:rgba(255,255,255,.18); color:white; }

/* ─── WRAPPER KONTEN ─── */
.konten {
  max-width: 700px;
  margin: 0 auto;
  padding: 0 24px;
}

/* ─── BAHAGIAN ─── */
.bahagian { padding: 72px 0; border-bottom:1px solid var(--krim2); }
.bahagian:last-child { border-bottom:none; }

/* ─── LABEL SEKSYEN ─── */
.seksyen-label {
  font-size:11px; font-weight:700; letter-spacing:2.5px;
  text-transform:uppercase; color:var(--emas);
  margin-bottom:12px; display:block;
}

/* ─── TAJUK H2 ─── */
.tajuk-besar {
  font-family:'Lora',serif;
  font-size: clamp(26px, 4vw, 38px);
  color:var(--hijau); line-height:1.15;
  margin-bottom:24px; font-weight:700;
}
.tajuk-besar em { font-style:italic; }

/* ─── PERENGGAN ─── */
.perenggan {
  font-size:17px; color:var(--teks2);
  line-height:1.85; margin-bottom:18px;
}
.perenggan strong { color:var(--hijau); }

/* ─── GAMBAR PENUH ─── */
.gambar-penuh {
  width:100%; border-radius:10px;
  overflow:hidden; margin:28px 0;
  box-shadow:0 4px 24px rgba(0,0,0,.1);
}
.gambar-penuh img {
  width:100%; height:380px;
  object-fit:cover; display:block;
}
.gambar-kapsi {
  font-size:12px; color:var(--teks3);
  text-align:center; margin-top:8px;
  font-style:italic; padding:0 8px;
}

/* ─── DUA GAMBAR ─── */
.dua-gambar { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin:28px 0; }
.dua-gambar .gambar-penuh { margin:0; }
.dua-gambar .gambar-penuh img { height:220px; }

/* ─── PETIKAN ─── */
.petikan {
  margin:28px 0;
  border-left:3px solid var(--hijau3);
  padding:18px 22px;
  background:rgba(30,58,30,.04);
  border-radius:0 8px 8px 0;
}
.petikan p {
  font-family:'Lora',serif;
  font-size:17px; line-height:1.7;
  color:var(--hijau); font-style:italic;
  margin-bottom:8px;
}
.petikan cite {
  font-size:12px; color:var(--teks3);
  font-style:normal; font-weight:600;
  display:flex; align-items:center; gap:6px;
}
.petikan cite::before { content:'—'; }

/* ─── KERATAN AKHBAR ─── */
.keratan {
  background:white;
  border:1px solid var(--krim2);
